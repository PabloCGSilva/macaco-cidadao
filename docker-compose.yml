version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: macaco_cidadao
      POSTGRES_USER: macaco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macaco"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"   # 5432 pode estar em uso localmente; acesse via localhost:5433

  panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://macaco:${POSTGRES_PASSWORD}@db:5432/macaco_cidadao
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_storage:/app/uploads

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://macaco:${POSTGRES_PASSWORD}@db:5432/macaco_cidadao
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_storage:/app/uploads

volumes:
  postgres_data:
  media_storage:
