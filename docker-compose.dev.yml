# Overlay de desenvolvimento com HTTPS via Caddy + TLS autoassinado.
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  panel:
    ports:
      - "5000:5000"   # acesso direto além do Caddy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: localhost
    depends_on:
      - panel

volumes:
  caddy_data:
  caddy_config:
